name: Publish NPM @a12e/accessmonitor-rulesets Package

on:
  push:
    branches:
      - main
    paths:
      - 'src/tests-metadata.ts'
      - '.changeset/**'
  workflow_dispatch: 

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  
      pull-requests: write 
      id-token: write  

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install
      
      - name: Build Package
        run: npm run build
        
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm publish --access public --provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
